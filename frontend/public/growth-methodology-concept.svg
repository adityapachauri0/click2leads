<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#0A0A0A"/>
  
  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" fill="white" font-size="48" font-weight="bold" font-family="Arial, sans-serif">
    Discover Our <tspan fill="#0EA5E9">Growth Methodology</tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="120" text-anchor="middle" fill="#999" font-size="18" font-family="Arial, sans-serif">
    Our proven 4-step process that has generated 4.7M+ leads
  </text>
  
  <!-- Central Circle Design -->
  <g transform="translate(600, 400)">
    <!-- Outer rotating ring -->
    <circle cx="0" cy="0" r="250" fill="none" stroke="url(#gradient1)" stroke-width="2" stroke-dasharray="10 5" opacity="0.3"/>
    
    <!-- Main circle -->
    <circle cx="0" cy="0" r="200" fill="rgba(14, 165, 233, 0.1)" stroke="url(#gradient1)" stroke-width="3"/>
    
    <!-- Center logo area -->
    <circle cx="0" cy="0" r="80" fill="rgba(14, 165, 233, 0.2)" stroke="#0EA5E9" stroke-width="2"/>
    <text x="0" y="10" text-anchor="middle" fill="white" font-size="32" font-weight="bold">C2L</text>
    
    <!-- Step 1 - Top -->
    <g transform="translate(0, -200)">
      <circle cx="0" cy="0" r="60" fill="#0EA5E9" opacity="0.9"/>
      <text x="0" y="-5" text-anchor="middle" fill="white" font-size="36" font-weight="bold">1</text>
      <text x="0" y="15" text-anchor="middle" fill="white" font-size="12">ANALYZE</text>
      
      <!-- Description box -->
      <rect x="-100" y="-120" width="200" height="60" rx="10" fill="rgba(14, 165, 233, 0.1)" stroke="#0EA5E9"/>
      <text x="0" y="-95" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Analysis & Strategy</text>
      <text x="0" y="-75" text-anchor="middle" fill="#ccc" font-size="11">Deep dive into your business</text>
    </g>
    
    <!-- Step 2 - Right -->
    <g transform="translate(200, 0)">
      <circle cx="0" cy="0" r="60" fill="#A855F7" opacity="0.9"/>
      <text x="0" y="-5" text-anchor="middle" fill="white" font-size="36" font-weight="bold">2</text>
      <text x="0" y="15" text-anchor="middle" fill="white" font-size="12">PLAN</text>
      
      <!-- Description box -->
      <rect x="80" y="-30" width="200" height="60" rx="10" fill="rgba(168, 85, 247, 0.1)" stroke="#A855F7"/>
      <text x="180" y="-5" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Quick Wins</text>
      <text x="180" y="15" text-anchor="middle" fill="#ccc" font-size="11">Immediate results strategy</text>
    </g>
    
    <!-- Step 3 - Bottom -->
    <g transform="translate(0, 200)">
      <circle cx="0" cy="0" r="60" fill="#10B981" opacity="0.9"/>
      <text x="0" y="-5" text-anchor="middle" fill="white" font-size="36" font-weight="bold">3</text>
      <text x="0" y="15" text-anchor="middle" fill="white" font-size="12">EXECUTE</text>
      
      <!-- Description box -->
      <rect x="-100" y="70" width="200" height="60" rx="10" fill="rgba(16, 185, 129, 0.1)" stroke="#10B981"/>
      <text x="0" y="95" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Implementation</text>
      <text x="0" y="115" text-anchor="middle" fill="#ccc" font-size="11">Full campaign rollout</text>
    </g>
    
    <!-- Step 4 - Left -->
    <g transform="translate(-200, 0)">
      <circle cx="0" cy="0" r="60" fill="#F59E0B" opacity="0.9"/>
      <text x="0" y="-5" text-anchor="middle" fill="white" font-size="36" font-weight="bold">4</text>
      <text x="0" y="15" text-anchor="middle" fill="white" font-size="12">OPTIMIZE</text>
      
      <!-- Description box -->
      <rect x="-280" y="-30" width="200" height="60" rx="10" fill="rgba(245, 158, 11, 0.1)" stroke="#F59E0B"/>
      <text x="-180" y="-5" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Continuous Growth</text>
      <text x="-180" y="15" text-anchor="middle" fill="#ccc" font-size="11">Data-driven optimization</text>
    </g>
    
    <!-- Connecting arrows (curved) -->
    <path d="M 0,-140 Q 140,-140 140,0" fill="none" stroke="#0EA5E9" stroke-width="2" marker-end="url(#arrow1)" opacity="0.5"/>
    <path d="M 140,0 Q 140,140 0,140" fill="none" stroke="#A855F7" stroke-width="2" marker-end="url(#arrow2)" opacity="0.5"/>
    <path d="M 0,140 Q -140,140 -140,0" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#arrow3)" opacity="0.5"/>
    <path d="M -140,0 Q -140,-140 0,-140" fill="none" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrow4)" opacity="0.5"/>
  </g>
  
  <!-- Alternative Linear Design Option -->
  <text x="600" y="680" text-anchor="middle" fill="#666" font-size="16" font-family="Arial, sans-serif">
    Alternative: Linear Process Flow →
  </text>
  
  <g transform="translate(150, 720)">
    <!-- Linear flow -->
    <line x1="0" y1="0" x2="900" y2="0" stroke="url(#gradient2)" stroke-width="3" opacity="0.3"/>
    
    <!-- Step circles in line -->
    <circle cx="0" cy="0" r="25" fill="#0EA5E9"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-size="16" font-weight="bold">1</text>
    
    <circle cx="300" cy="0" r="25" fill="#A855F7"/>
    <text x="300" y="5" text-anchor="middle" fill="white" font-size="16" font-weight="bold">2</text>
    
    <circle cx="600" cy="0" r="25" fill="#10B981"/>
    <text x="600" y="5" text-anchor="middle" fill="white" font-size="16" font-weight="bold">3</text>
    
    <circle cx="900" cy="0" r="25" fill="#F59E0B"/>
    <text x="900" y="5" text-anchor="middle" fill="white" font-size="16" font-weight="bold">4</text>
  </g>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    
    <!-- Arrow markers -->
    <marker id="arrow1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" fill="#0EA5E9">
      <polygon points="0 0, 10 3, 0 6" />
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" fill="#A855F7">
      <polygon points="0 0, 10 3, 0 6" />
    </marker>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" fill="#10B981">
      <polygon points="0 0, 10 3, 0 6" />
    </marker>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" fill="#F59E0B">
      <polygon points="0 0, 10 3, 0 6" />
    </marker>
  </defs>
</svg>