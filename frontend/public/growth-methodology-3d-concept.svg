<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <!-- Radial gradient for background -->
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0A0A;stop-opacity:1" />
    </radialGradient>
    
    <!-- 3D cube gradients -->
    <linearGradient id="cube1Top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3EAFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cube1Side" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0875A7;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cube2Top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C77DFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cube2Side" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AE3;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cube3Top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cube3Side" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cube4Top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cube4Side" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effects -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.3"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1400" height="900" fill="url(#bgGradient)"/>
  
  <!-- Grid floor for 3D effect -->
  <g opacity="0.2">
    <line x1="200" y1="700" x2="1200" y2="700" stroke="#0EA5E9" stroke-width="1"/>
    <line x1="300" y1="750" x2="1100" y2="750" stroke="#0EA5E9" stroke-width="1"/>
    <line x1="400" y1="800" x2="1000" y2="800" stroke="#0EA5E9" stroke-width="1"/>
    
    <line x1="350" y1="650" x2="350" y2="850" stroke="#0EA5E9" stroke-width="1"/>
    <line x1="550" y1="650" x2="550" y2="850" stroke="#0EA5E9" stroke-width="1"/>
    <line x1="750" y1="650" x2="750" y2="850" stroke="#0EA5E9" stroke-width="1"/>
    <line x1="950" y1="650" x2="950" y2="850" stroke="#0EA5E9" stroke-width="1"/>
  </g>
  
  <!-- Title -->
  <text x="700" y="80" text-anchor="middle" fill="white" font-size="52" font-weight="bold" font-family="Arial, sans-serif">
    Discover Our <tspan fill="#0EA5E9">Growth Methodology</tspan>
  </text>
  
  <!-- 3D Cubes representing steps -->
  
  <!-- Step 1 - 3D Cube -->
  <g transform="translate(250, 350)" filter="url(#shadow)">
    <!-- Bottom face -->
    <path d="M 0,100 L 80,140 L 160,100 L 80,60 Z" fill="#064E7B" opacity="0.8"/>
    <!-- Back face -->
    <path d="M 0,0 L 0,100 L 80,60 L 80,-40 Z" fill="url(#cube1Side)" opacity="0.9"/>
    <!-- Right face -->
    <path d="M 80,-40 L 80,60 L 160,100 L 160,0 Z" fill="url(#cube1Side)" opacity="0.7"/>
    <!-- Top face -->
    <path d="M 0,0 L 80,-40 L 160,0 L 80,40 Z" fill="url(#cube1Top)" filter="url(#glow)"/>
    
    <!-- Text on cube -->
    <text x="80" y="10" text-anchor="middle" fill="white" font-size="48" font-weight="bold">1</text>
    
    <!-- Label -->
    <text x="80" y="-70" text-anchor="middle" fill="white" font-size="22" font-weight="bold">ANALYZE</text>
    <text x="80" y="-50" text-anchor="middle" fill="#ccc" font-size="14">Deep Business Analysis</text>
  </g>
  
  <!-- Step 2 - 3D Cube -->
  <g transform="translate(500, 350)" filter="url(#shadow)">
    <!-- Bottom face -->
    <path d="M 0,100 L 80,140 L 160,100 L 80,60 Z" fill="#6B21A8" opacity="0.8"/>
    <!-- Back face -->
    <path d="M 0,0 L 0,100 L 80,60 L 80,-40 Z" fill="url(#cube2Side)" opacity="0.9"/>
    <!-- Right face -->
    <path d="M 80,-40 L 80,60 L 160,100 L 160,0 Z" fill="url(#cube2Side)" opacity="0.7"/>
    <!-- Top face -->
    <path d="M 0,0 L 80,-40 L 160,0 L 80,40 Z" fill="url(#cube2Top)" filter="url(#glow)"/>
    
    <!-- Text on cube -->
    <text x="80" y="10" text-anchor="middle" fill="white" font-size="48" font-weight="bold">2</text>
    
    <!-- Label -->
    <text x="80" y="-70" text-anchor="middle" fill="white" font-size="22" font-weight="bold">STRATEGIZE</text>
    <text x="80" y="-50" text-anchor="middle" fill="#ccc" font-size="14">Quick Wins Planning</text>
  </g>
  
  <!-- Step 3 - 3D Cube -->
  <g transform="translate(750, 350)" filter="url(#shadow)">
    <!-- Bottom face -->
    <path d="M 0,100 L 80,140 L 160,100 L 80,60 Z" fill="#047857" opacity="0.8"/>
    <!-- Back face -->
    <path d="M 0,0 L 0,100 L 80,60 L 80,-40 Z" fill="url(#cube3Side)" opacity="0.9"/>
    <!-- Right face -->
    <path d="M 80,-40 L 80,60 L 160,100 L 160,0 Z" fill="url(#cube3Side)" opacity="0.7"/>
    <!-- Top face -->
    <path d="M 0,0 L 80,-40 L 160,0 L 80,40 Z" fill="url(#cube3Top)" filter="url(#glow)"/>
    
    <!-- Text on cube -->
    <text x="80" y="10" text-anchor="middle" fill="white" font-size="48" font-weight="bold">3</text>
    
    <!-- Label -->
    <text x="80" y="-70" text-anchor="middle" fill="white" font-size="22" font-weight="bold">IMPLEMENT</text>
    <text x="80" y="-50" text-anchor="middle" fill="#ccc" font-size="14">Execute Campaigns</text>
  </g>
  
  <!-- Step 4 - 3D Cube -->
  <g transform="translate(1000, 350)" filter="url(#shadow)">
    <!-- Bottom face -->
    <path d="M 0,100 L 80,140 L 160,100 L 80,60 Z" fill="#B45309" opacity="0.8"/>
    <!-- Back face -->
    <path d="M 0,0 L 0,100 L 80,60 L 80,-40 Z" fill="url(#cube4Side)" opacity="0.9"/>
    <!-- Right face -->
    <path d="M 80,-40 L 80,60 L 160,100 L 160,0 Z" fill="url(#cube4Side)" opacity="0.7"/>
    <!-- Top face -->
    <path d="M 0,0 L 80,-40 L 160,0 L 80,40 Z" fill="url(#cube4Top)" filter="url(#glow)"/>
    
    <!-- Text on cube -->
    <text x="80" y="10" text-anchor="middle" fill="white" font-size="48" font-weight="bold">4</text>
    
    <!-- Label -->
    <text x="80" y="-70" text-anchor="middle" fill="white" font-size="22" font-weight="bold">OPTIMIZE</text>
    <text x="80" y="-50" text-anchor="middle" fill="#ccc" font-size="14">Continuous Growth</text>
  </g>
  
  <!-- 3D Arrows connecting cubes -->
  <g opacity="0.8">
    <!-- Arrow 1 to 2 -->
    <path d="M 410,390 Q 480,340 570,390" fill="none" stroke="#0EA5E9" stroke-width="4" stroke-linecap="round"/>
    <polygon points="570,390 560,385 560,395" fill="#0EA5E9"/>
    
    <!-- Arrow 2 to 3 -->
    <path d="M 660,390 Q 730,340 820,390" fill="none" stroke="#A855F7" stroke-width="4" stroke-linecap="round"/>
    <polygon points="820,390 810,385 810,395" fill="#A855F7"/>
    
    <!-- Arrow 3 to 4 -->
    <path d="M 910,390 Q 980,340 1070,390" fill="none" stroke="#10B981" stroke-width="4" stroke-linecap="round"/>
    <polygon points="1070,390 1060,385 1060,395" fill="#10B981"/>
    
    <!-- Return arrow 4 to 1 (underneath) -->
    <path d="M 1080,480 Q 700,550 330,480" fill="none" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" stroke-dasharray="10,5" opacity="0.5"/>
    <polygon points="330,480 340,475 340,485" fill="#F59E0B" opacity="0.5"/>
  </g>
  
  <!-- Alternative: 3D Pyramid Design -->
  <g transform="translate(700, 650)">
    <text x="0" y="-20" text-anchor="middle" fill="#666" font-size="18">Alternative: 3D Pyramid Hierarchy</text>
    
    <!-- Pyramid layers -->
    <g opacity="0.7">
      <!-- Base layer - Analyze -->
      <path d="M -150,100 L -50,140 L 150,100 L 50,60 Z" fill="#0EA5E9" opacity="0.8"/>
      <path d="M -150,100 L -150,120 L -50,160 L -50,140 Z" fill="#0875A7"/>
      <path d="M -50,140 L -50,160 L 150,120 L 150,100 Z" fill="#064E7B"/>
      
      <!-- Second layer - Strategize -->
      <path d="M -100,60 L -25,85 L 100,60 L 25,35 Z" fill="#A855F7" opacity="0.8"/>
      <path d="M -100,60 L -100,75 L -25,100 L -25,85 Z" fill="#7C3AE3"/>
      <path d="M -25,85 L -25,100 L 100,75 L 100,60 Z" fill="#6B21A8"/>
      
      <!-- Third layer - Implement -->
      <path d="M -50,35 L 0,50 L 50,35 L 0,20 Z" fill="#10B981" opacity="0.8"/>
      <path d="M -50,35 L -50,45 L 0,60 L 0,50 Z" fill="#059669"/>
      <path d="M 0,50 L 0,60 L 50,45 L 50,35 Z" fill="#047857"/>
      
      <!-- Top - Optimize -->
      <path d="M -25,20 L 0,10 L 25,20 L 0,30 Z" fill="#F59E0B"/>
      <polygon points="0,-10 -15,10 0,30 15,10" fill="#D97706" opacity="0.8"/>
    </g>
  </g>
  
  <!-- Floating particles for depth -->
  <g opacity="0.3">
    <circle cx="200" cy="200" r="2" fill="#0EA5E9">
      <animate attributeName="cy" values="200;180;200" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="250" r="3" fill="#A855F7">
      <animate attributeName="cy" values="250;220;250" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="180" r="2" fill="#10B981">
      <animate attributeName="cy" values="180;160;180" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="230" r="3" fill="#F59E0B">
      <animate attributeName="cy" values="230;200;230" dur="4.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>